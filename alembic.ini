[alembic]
script_location = alembic
prepend_sys_path = .

# The sqlalchemy.url below is a fallback for offline mode.
# Online mode reads DATABASE_SYNC_URL from the environment (set in .env or
# system environment).  This keeps credentials out of version control.
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/qpilot

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
