# QPilot Frontend — Nginx configuration
# ======================================
#
# Serves the built SPA and proxies /api requests to the backend.
# All routes fall back to index.html for client-side routing.

server {
    listen       80;
    server_name  localhost;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Root directory (built SPA) ────────────────────────────
    root   /usr/share/nginx/html;
    index  index.html;

    # ── Static assets with long cache ─────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for long-running AI analysis
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny access to hidden files ───────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
